name: Nightly Doc Audit

on:
  schedule:
    - cron: '0 5 * * *'  # 00:00 EST / 05:00 UTC daily
  workflow_dispatch:       # allow manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - 'StructuralSizer/src/**'
      - 'StructuralSynthesizer/src/**'
      - 'docs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-and-launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for git log

      - name: Check for already-running doc audit (GitHub)
        id: concurrent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Avoid launching a second agent if another run of this workflow is already in progress
          RUNS=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/doc-audit.yml/runs?status=in_progress&per_page=10")
          COUNT=$(echo "$RUNS" | jq '.total_count')
          if [ "$COUNT" -gt 1 ]; then
            echo "Another doc-audit run already in progress — skipping agent launch."
            echo "should_launch=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_launch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for already-running Cursor doc-audit agent
        id: cursor_agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          if [ -z "${CURSOR_API_KEY}" ]; then
            echo "No CURSOR_API_KEY — skipping Cursor check, allowing launch."
            echo "cursor_agent_running=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          resp_file=$(mktemp)
          code=$(curl -s -w "%{http_code}" -o "$resp_file" -u "${CURSOR_API_KEY}:" "https://api.cursor.com/v0/agents?limit=50")
          if [ "$code" != "200" ]; then
            echo "Cursor API returned $code — allowing launch (no double-check)."
            echo "cursor_agent_running=false" >> "$GITHUB_OUTPUT"
            rm -f "$resp_file"
            exit 0
          fi
          running=$(jq -c --arg repo "$REPO_URL" '[.agents[]? | select(.status == "RUNNING" and ((.source.repository // "") == $repo))] | length' "$resp_file" 2>/dev/null || echo "0")
          rm -f "$resp_file"
          if [ "${running:-0}" -gt 0 ] 2>/dev/null; then
            echo "A Cursor doc-audit agent is already RUNNING for this repo — skipping launch."
            echo "cursor_agent_running=true" >> "$GITHUB_OUTPUT"
          else
            echo "cursor_agent_running=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for documentation-relevant changes
        id: check
        run: |
          CHANGED=$(git log origin/main --since="24 hours ago" --name-only --pretty=format: | \
            grep -E '^(StructuralSizer/src/|StructuralSynthesizer/src/|docs/)' | \
            sort -u)

          if [ -z "$CHANGED" ]; then
            echo "No doc-relevant changes in last 24h — skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(echo "$CHANGED" | wc -l)
            echo "Changes detected in $COUNT files:"
            echo "$CHANGED"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # Launch step: Cursor Cloud Agent needs repo access via the Cursor GitHub App.
      # If you see "repository that does not exist or is not accessible to the parent installation":
      # - Install the Cursor GitHub App (https://github.com/apps/cursor) and grant it this repo.
      # - Ensure the API key (CURSOR_API_KEY) is from the same Cursor team that has the app installed.
      # - For org repos: install the app on the org and allow this repository.
      - name: Launch Cursor Cloud Agent
        if: steps.check.outputs.has_changes == 'true' && steps.concurrent.outputs.should_launch == 'true' && steps.cursor_agent.outputs.cursor_agent_running != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          PROMPT=$(cat scripts/prompts/doc-audit.md)
          REPO_URL="https://github.com/${{ github.repository }}"
          BRANCH="cursor/doc-audit-$(date +%Y-%m-%d)"

          RESPONSE=$(curl -s -X POST https://api.cursor.com/v0/agents \
            -u "$CURSOR_API_KEY:" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg repo "$REPO_URL" \
              --arg branch "$BRANCH" \
              '{
                prompt: { text: $prompt },
                model: "gpt-5.2",
                source: { repository: $repo, ref: "main" },
                target: { autoCreatePr: true, branchName: $branch }
              }')")

          echo "Agent launched:"
          echo "$RESPONSE" | jq .

          if echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
            echo "::error::Cursor API error: $(echo "$RESPONSE" | jq -r '.error')"
            echo "::error::Ensure the Cursor GitHub App has access to this repo and the API key matches that installation. See workflow comments for troubleshooting."
            exit 1
          fi
