# Runs the doc-audit script tests (mock env, no real API calls) when the workflow or test script changes.
name: Test doc-audit scripts

on:
  push:
    paths:
      - '.github/workflows/doc-audit.yml'
      - '.github/workflows/test-doc-audit-scripts.sh'
  pull_request:
    paths:
      - '.github/workflows/doc-audit.yml'
      - '.github/workflows/test-doc-audit-scripts.sh'

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate doc-audit YAML
        run: python3 -c "import yaml; yaml.safe_load(open('.github/workflows/doc-audit.yml')); print('YAML OK')"

      - name: Run doc-audit script tests (mock env)
        run: bash .github/workflows/test-doc-audit-scripts.sh
