name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-api-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  APP_RUNNER_SERVICE_ARN: ${{ vars.APP_RUNNER_SERVICE_ARN }}
  APP_URL: ${{ vars.APP_URL }}

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest
    # Build (including sysimage) can take 45–60+ min; keep under credential/session limits.
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # Request 2-hour session so credentials don't expire during long Docker build + push + deploy.
      # IAM role must allow it: set MaxSessionDuration to 7200 (or higher) on the OIDC role.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: meta
        run: |
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image (cached)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update App Runner image to immutable tag
        env:
          APP_RUNNER_SERVICE_ARN: ${{ env.APP_RUNNER_SERVICE_ARN }}
        run: |
          set -e
          IMAGE_IDENTIFIER="${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.sha_tag }}"
          aws apprunner describe-service \
            --service-arn "${APP_RUNNER_SERVICE_ARN}" \
            --query 'Service.SourceConfiguration' \
            --output json > source-config.json

          jq --arg image "${IMAGE_IDENTIFIER}" \
            '.ImageRepository.ImageIdentifier = $image | .AutoDeploymentsEnabled = false' \
            source-config.json > new-source-config.json

          OPERATION_ID=""
          for i in $(seq 1 30); do
            set +e
            UPDATE_OUT=$(aws apprunner update-service \
              --service-arn "${APP_RUNNER_SERVICE_ARN}" \
              --source-configuration file://new-source-config.json \
              --query 'OperationId' \
              --output text 2>&1)
            UPDATE_RC=$?
            set -e

            if [ "${UPDATE_RC}" -eq 0 ]; then
              OPERATION_ID="${UPDATE_OUT}"
              break
            fi

            if echo "${UPDATE_OUT}" | grep -q "OPERATION_IN_PROGRESS"; then
              echo "App Runner busy (attempt ${i}/30); retrying in 15s..."
              sleep 15
              continue
            fi

            echo "${UPDATE_OUT}"
            exit "${UPDATE_RC}"
          done

          if [ -z "${OPERATION_ID}" ]; then
            echo "Timed out waiting to start App Runner update operation"
            exit 1
          fi

          echo "Started App Runner operation: ${OPERATION_ID}"

          # Poll list-operations until our operation (by Id) reaches a terminal status.
          # App Runner deployments can take 10+ min; allow up to 20 min (120 × 10s).
          for i in $(seq 1 120); do
            LIST_JSON=$(aws apprunner list-operations \
              --service-arn "${APP_RUNNER_SERVICE_ARN}" \
              --max-results 5 \
              --output json)
            STATUS=$(echo "${LIST_JSON}" | jq -r --arg id "${OPERATION_ID}" \
              '.OperationSummaryList[] | select(.Id == $id) | .Status // empty')
            if [ -z "${STATUS}" ]; then
              echo "Poll ${i}: operation not in list yet, waiting 10s..."
              sleep 10
              continue
            fi
            echo "Poll ${i}: status=${STATUS}"
            case "${STATUS}" in
              SUCCEEDED) exit 0 ;;
              FAILED|ROLLBACK_FAILED|ROLLBACK_SUCCEEDED)
                echo "App Runner operation failed: ${STATUS}"
                exit 1
                ;;
              *) sleep 10 ;;
            esac
          done

          echo "Timed out waiting for App Runner operation to finish"
          exit 1

      # Smoke checks run only when repo variable APP_URL is set (e.g. https://xxx.us-east-1.awsapprunner.com).
      - name: Smoke check /health
        if: ${{ env.APP_URL != '' }}
        run: |
          for i in $(seq 1 24); do
            if curl --fail --silent --show-error "${APP_URL%/}/health" >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt ${i}/24: waiting 5s..."
            sleep 5
          done
          echo "Health check failed after retries"
          exit 1

      - name: Smoke check /schema
        if: ${{ env.APP_URL != '' }}
        run: |
          # Full API loads in background after bootstrap; allow up to ~2 min.
          for i in $(seq 1 24); do
            if curl --fail --silent --show-error "${APP_URL%/}/schema" >/dev/null; then
              echo "Schema check passed"
              exit 0
            fi
            echo "Attempt ${i}/24: waiting 5s..."
            sleep 5
          done
          echo "Schema check failed after retries"
          exit 1
